<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SENTINEL — Pipeline A→C · Multi-graphique + Export JSON</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #0b0f1a; color: #e5e7eb; }

.topbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
.topbar h1 { color:#38bdf8; margin:0; font-size:22px; }
.toplinks { display:flex; gap:10px; }
.toplinks a {
    padding:7px 14px; background:#0f172a; color:#94a3b8;
    border:1px solid #334155; border-radius:6px; text-decoration:none; font-size:13px;
}
.toplinks a:hover { background:#1e293b; color:#e2e8f0; }
.toplinks a.active { border-color:#38bdf8; color:#38bdf8; }

.upload-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
input[type=file] {
    flex:1; padding:10px; background:#020617; color:#e5e7eb;
    border:1px solid #334155; border-radius:6px; font-size:13px; cursor:pointer;
}
button.primary {
    padding:10px 24px; background:#2563eb; color:#fff; border:none;
    border-radius:6px; cursor:pointer; font-size:14px; font-weight:bold; white-space:nowrap;
}
button.primary:hover { background:#1d4ed8; }
button.primary:disabled { background:#1e3a8a; cursor:not-allowed; }

.graph-block {
    background:#0f172a; border:1px solid #1e293b; border-radius:8px;
    padding:20px; margin-bottom:24px;
}
.graph-block h2 { color:#38bdf8; font-size:16px; margin:0 0 14px 0; display:flex; align-items:center; gap:10px; }
.graph-block h2 .badge {
    font-size:11px; padding:3px 10px; border-radius:12px; font-weight:bold;
}
.badge-valid   { background:#14532d; color:#4ade80; border:1px solid #16a34a; }
.badge-invalid { background:#450a0a; color:#f87171; border:1px solid #b91c1c; }
.badge-loading { background:#1e1b4b; color:#818cf8; border:1px solid #4338ca; }

.block-body { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:700px){ .block-body { grid-template-columns:1fr; } }

canvas { display:block; width:100%; border-radius:6px; border:1px solid #1e293b; }
canvas-wrap { overflow:hidden; }

pre.json-out {
    background:#020617; border:1px solid #1e293b; border-radius:6px;
    padding:12px; color:#86efac; font-size:11px; white-space:pre-wrap;
    max-height:320px; overflow-y:auto; margin:0;
}
pre.invalid { color:#f87171; }
pre.valid   { color:#86efac; }

.export-btn {
    margin-top:10px; padding:8px 18px; background:#16a34a; color:#fff;
    border:none; border-radius:5px; cursor:pointer; font-size:13px; font-weight:bold; width:100%;
}
.export-btn:hover { background:#15803d; }
.export-btn:disabled { background:#14532d; cursor:not-allowed; opacity:0.6; }

.spinner {
    display:inline-block; width:12px; height:12px;
    border:2px solid #334155; border-top-color:#38bdf8;
    border-radius:50%; animation:spin .8s linear infinite;
    margin-right:6px; vertical-align:middle;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
    <h1>SENTINEL V2</h1>
    <div class="toplinks">
        <a href="/" class="active">📊 Pipeline A→C</a>
        <a href="/phase0.html">🔍 Phase 0 — Lecture</a>
    </div>
</div>

<div class="upload-row">
    <input type="file" id="chartFiles" accept="image/*" multiple>
    <button class="primary" id="uploadBtn" onclick="uploadCharts()">🚀 Analyser tous</button>
</div>

<div id="graphsContainer"></div>

<script>
async function uploadCharts() {
    const files = document.getElementById('chartFiles').files;
    const container = document.getElementById('graphsContainer');
    const btn = document.getElementById('uploadBtn');
    container.innerHTML = '';

    if (!files.length) { alert("Sélectionnez au moins un fichier."); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analyse en cours…';

    for (const file of files) {
        const block  = document.createElement('div'); block.className = 'graph-block';
        const title  = document.createElement('h2');
        const badge  = document.createElement('span'); badge.className = 'badge badge-loading'; badge.textContent = '⏳ En cours';
        title.appendChild(document.createTextNode(file.name + ' ')); title.appendChild(badge);

        const body   = document.createElement('div'); body.className = 'block-body';
        const canvasWrap = document.createElement('div');
        const cvs    = document.createElement('canvas');
        const rightCol = document.createElement('div');
        const pre    = document.createElement('pre'); pre.className = 'json-out'; pre.textContent = 'Lecture en cours…';
        const exportBtn = document.createElement('button'); exportBtn.textContent = '⬇ Exporter JSON';
        exportBtn.className = 'export-btn'; exportBtn.disabled = true;

        canvasWrap.appendChild(cvs);
        rightCol.appendChild(pre); rightCol.appendChild(exportBtn);
        body.appendChild(canvasWrap); body.appendChild(rightCol);
        block.appendChild(title); block.appendChild(body);
        container.appendChild(block);

        const ctx = cvs.getContext('2d');
        const img = new Image(); img.src = URL.createObjectURL(file);
        await new Promise(r => img.onload = r);
        cvs.width = img.width; cvs.height = img.height;
        ctx.drawImage(img, 0, 0);

        try {
            const formData = new FormData(); formData.append('chart', file);
            const response = await fetch('/upload-graph', { method: 'POST', body: formData });
            const data = await response.json();

            badge.textContent = data.setup_valid ? '✅ VALIDE' : '❌ REJETÉ';
            badge.className   = 'badge ' + (data.setup_valid ? 'badge-valid' : 'badge-invalid');
            pre.textContent   = JSON.stringify(data, null, 2);
            pre.className     = 'json-out ' + (data.setup_valid ? 'valid' : 'invalid');
            exportBtn.disabled = false;

            exportBtn.onclick = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `${file.name.replace(/\.[^.]+$/, '')}_decision.json`;
                a.click();
            };

            drawOverlay(ctx, cvs, data);

        } catch (err) {
            console.error(err);
            badge.textContent = '❌ Erreur'; badge.className = 'badge badge-invalid';
            pre.textContent = 'Erreur lors de l\'upload ou de l\'analyse.';
            pre.className = 'json-out invalid';
        }
    }

    btn.disabled = false;
    btn.innerHTML = '🚀 Analyser tous';
}

function safeMax(...vals) {
    const nums = vals.flat().filter(v => typeof v === 'number' && isFinite(v));
    return nums.length ? Math.max(...nums) : 1;
}

function drawLine(ctx, y, color, label, xAlign = 'left') {
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(ctx.canvas.width, y); ctx.stroke();
    ctx.fillStyle = color; ctx.font = 'bold 14px Arial';
    const x = xAlign === 'right' ? ctx.canvas.width - 150 : 10;
    ctx.fillText(label, x, y - 5);
}

function drawOverlay(ctx, cvs, data) {
    const vp = data.justification?.volume_profile || {};
    const vpVals = [vp.VAL, vp.POC, vp.VAH].filter(v => typeof v === 'number');
    const entryVals = (data.entry_zone || []).filter(Boolean);
    const slVals    = data.stop_loss != null ? [data.stop_loss] : [];
    const tpVals    = (data.take_profit || []).filter(Boolean);
    const allNums   = [...vpVals, ...entryVals, ...slVals, ...tpVals];
    const maxVal    = safeMax(allNums);
    if (!maxVal) return;

    const H = cvs.height;
    const scaleY = v => H - (v / maxVal * H);

    // Volume Profile lines
    const vpColors = { VAL: 'orange', POC: '#4ade80', VAH: '#f87171' };
    for (const [key, val] of Object.entries(vp)) {
        if (typeof val !== 'number') continue;
        drawLine(ctx, scaleY(val), vpColors[key] || 'white', `${key}: ${val}`);
    }

    // Entry / SL / TP
    const levelDefs = [
        { label: 'Entry', vals: entryVals, color: 'cyan' },
        { label: 'StopLoss', vals: slVals, color: '#f87171' },
        { label: 'TakeProfit', vals: tpVals, color: '#4ade80' },
    ];
    for (const { label, vals, color } of levelDefs) {
        for (const val of vals) {
            if (typeof val !== 'number') continue;
            drawLine(ctx, scaleY(val), color, `${label}: ${val}`, 'right');
        }
    }

    // Zone overlays
    const zoneH = 0.03 * H;
    ctx.globalAlpha = 0.2;
    const zones = [
        { key: 'order_blocks', color: 'purple',  offset: 0.03 },
        { key: 'fibonacci',    color: 'cyan',    offset: 0.06 },
        { key: 'obpi',         color: 'yellow',  offset: 0.09 },
    ];
    for (const { key, color, offset } of zones) {
        if (data.justification?.[key]) {
            ctx.fillStyle = color;
            ctx.fillRect(0, H - offset * H, cvs.width, zoneH);
        }
    }
    ctx.globalAlpha = 1;

    // Justification labels
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, cvs.width, Object.keys(data.justification || {}).length * 18 + 10);
    ctx.fillStyle = '#e2e8f0'; ctx.font = '13px Arial';
    let yText = 18;
    for (const [k, v] of Object.entries(data.justification || {})) {
        if (typeof v === 'object') continue;
        ctx.fillText(`${k}: ${String(v).substring(0, 80)}`, 8, yText);
        yText += 18;
    }
}
</script>
</body>
</html>
